apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: pingpong-cpu-rate
  namespace: exercises
spec:
  metrics:
    - name: pingpong-cpu-rate
      initialDelay: 1m
      successCondition: result < 0.00001
      provider:
        prometheus:
          address: http://prom-prometheus-server.monitoring.svc.cluster.local:80
          query: |
            scalar(sum(rate(container_cpu_usage_seconds_total{namespace="exercises"}[5m])))