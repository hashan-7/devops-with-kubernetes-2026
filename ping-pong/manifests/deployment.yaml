apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      volumes:
        - name: local-persistent-storage
          persistentVolumeClaim:
            claimName: shared-claim
      containers:
        - name: ping-pong
          image: ping-pong:v1
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: local-persistent-storage
              mountPath: /usr/src/app/files